# Dev-only overlay — auto-loaded by `docker compose up`.
#
# Mounts host source tree into the gateway container so edits take effect
# on restart without rebuilding the image. Skip this file for reproducible
# experiment runs:
#
#   docker compose -f docker-compose.yml up        # image code only
#   docker compose up                              # image + this override
#
services:
  gateway:
    volumes:
      - ../rag_guard:/app/rag_guard:ro
      - ../prompt_guard:/app/prompt_guard:ro
      - ../output_agency_defense:/app/output_agency_defense:ro
      - ../fusion_gateway:/app/fusion_gateway:ro
      - ../api:/app/api:ro
      - ../evaluation:/app/evaluation:ro
