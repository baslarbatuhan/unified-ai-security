version: 1
targets:
- id: mock_echo
  name: Mock Echo Chatbot (local)
  type: mock
  enabled: true
  timeout_seconds: 5.0
  has_tools: false
  auth: {}
  http_method: POST
  metadata:
    description: Echoes the prompt back with a safe prefix. For dev + CI.
- id: internal_chatbot_api
  name: Internal Chatbot (REST)
  type: api
  enabled: false
  endpoint: https://chatbot.internal.example/api/chat
  timeout_seconds: 30.0
  has_tools: false
  auth:
    type: bearer
    token_env: CHATBOT_BEARER_TOKEN
  http_method: POST
  request_template:
    messages:
    - role: user
      content: '{prompt}'
  response_path: choices.0.message.content
  rate_limit:
    requests_per_minute: 60
    burst: 10
  metadata:
    notes: Tool calling disabled by backend for this term.
- id: example_web_chatbot
  name: Example Web Chatbot (Playwright)
  type: web
  enabled: false
  endpoint: https://example.com/chat
  timeout_seconds: 45.0
  has_tools: false
  auth: {}
  http_method: POST
  selectors:
    input: textarea[data-testid=chat-input]
    submit: button[data-testid=chat-send]
    response: '[data-testid=chat-message]:last-child'
    fallback_input:
    - textarea.chat-input
    - '#chat-textarea'
    fallback_response:
    - .message.assistant:last-child
    response_wait_ms: 4000
  metadata:
    notes: Update selectors when the UI revs.
- id: chatbot_n4b
  name: N4B Chatbot
  type: api
  enabled: true
  endpoint: http://10.147.10.22:9993/chat/n4bchatbot
  timeout_seconds: 30.0
  has_tools: false
  auth: {}
  http_method: POST
  request_template:
    message: '{prompt}'
  response_path: result.answer
  metadata: {}
- id: gemini_flash
  name: Gemini Flash (Google)
  type: api
  enabled: true
  endpoint: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
  timeout_seconds: 30.0
  has_tools: false
  auth:
    type: query
    query_key: key
    query_value_env: GEMINI_API_KEY
  http_method: POST
  request_template:
    contents:
    - parts:
      - text: '{prompt}'
  response_path: candidates.0.content.parts.0.text
  rate_limit:
    requests_per_minute: 60
    burst: 5
  metadata:
    provider: google
    notes: |
      Free-tier Gemini Flash. Auth via ?key=... query parameter,
      value pulled from GEMINI_API_KEY env var at request time.
      Hafta 11.2 auth pipeline validates the shape; the secret
      never enters targets.yaml or any committed file.
- id: local_tools
  name: Local Tools (weather / stock / calc)
  type: tools_local
  enabled: true
  timeout_seconds: 15.0
  has_tools: true
  auth: {}
  metadata:
    description: |
      Gateway-side tool execution. Runs ATK-031..050 scenarios end-to-end:
      gateway pre-screens tool_call, then if allowed the runner actually
      invokes the registered tool (open-meteo for weather_forecast,
      Yahoo Finance public chart for stock_quote, simpleeval for
      calc_evaluate). Demonstrates the full pre-screen + execute +
      response lifecycle.
    tools_registered:
      - weather_forecast
      - stock_quote
      - calc_evaluate
