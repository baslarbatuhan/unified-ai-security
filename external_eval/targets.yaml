version: 1
targets:
- id: mock_echo
  name: Mock Echo Chatbot (local)
  type: mock
  enabled: true
  timeout_seconds: 5.0
  has_tools: false
  auth: {}
  metadata:
    description: Echoes the prompt back with a safe prefix. For dev + CI.
- id: internal_chatbot_api
  name: Internal Chatbot (REST)
  type: api
  enabled: false
  endpoint: https://chatbot.internal.example/api/chat
  timeout_seconds: 30.0
  has_tools: false
  auth:
    type: bearer
    token_env: CHATBOT_BEARER_TOKEN
  request_template:
    messages:
    - role: user
      content: '{prompt}'
  response_path: choices.0.message.content
  rate_limit:
    requests_per_minute: 60
    burst: 10
  metadata:
    notes: Tool calling disabled by backend for this term.
- id: example_web_chatbot
  name: Example Web Chatbot (Playwright)
  type: web
  enabled: false
  endpoint: https://example.com/chat
  timeout_seconds: 45.0
  has_tools: false
  auth: {}
  selectors:
    input: textarea[data-testid=chat-input]
    submit: button[data-testid=chat-send]
    response: '[data-testid=chat-message]:last-child'
    fallback_input:
    - textarea.chat-input
    - '#chat-textarea'
    fallback_response:
    - .message.assistant:last-child
    response_wait_ms: 4000
  metadata:
    notes: Update selectors when the UI revs.
