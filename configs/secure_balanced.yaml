# Fusion Gateway — secure balanced configuration
# ================================================
# This file is loaded by fusion_gateway/engine.py at startup.

llm:
  provider: ollama
  model: qwen2.5:7b
  fallback_model: llama3.1:8b

# Used by rag_guard/rag_baseline.py (indexing experiments). Gateway RAG detection uses
# PoisonDetector embeddings + LLM judge — not Chroma retrieval in the hot path.
vector_db:
  type: chromadb

policy:
  fusion:
    type: weighted_sum
    weights:
      output_agency: 0.40
      prompt_guard: 0.30
      rag_guard: 0.30
    thresholds:
      allow: 0.30
      sanitize: 0.60
      block: 0.85
    # Max-rule override: prevents fusion dilution when a single module
    # flags a critical threat.
    override:
      critical_threshold: 0.85
      critical_multiplier: 0.95
      elevated_threshold: 0.60
      # 1.0 = preserve module_max verbatim when any module is in elevated band.
      # Earlier 0.85 was pulling 0.67 → 0.57, flipping a flag to sanitize.
      # Standalone RAG module already decides at 0.60, so the gateway should
      # not soften that decision by a weighted-sum penalty.
      elevated_multiplier: 1.0

modules:
  output_agency:
    enabled: true
  prompt_guard:
    enabled: true
    semantic_threshold: 0.65
    semantic_threshold_mode: adaptive
    adaptive_thresholds:
      short: 0.55    # prompt < short_max_chars
      medium: 0.60   # prompt < medium_max_chars
      long: 0.65     # longer prompts
      short_max_chars: 50
      medium_max_chars: 200
  rag_guard:
    enabled: true
    poison_threshold: 0.45
    llm_judge:
      embedding_weight: 0.3
      judge_weight: 0.7
      judge_abstain_threshold: 0.15
      embedding_override_multiplier: 0.85
      # Chunk-based analysis: split doc into sentence groups, judge each, take max score.
      # Defeats "holistic dilution" where judge averages over 90% clean + 10% poison.
      # Trade-off: ~3x latency increase (per doc split into 3-4 chunks).
      enable_chunked_analysis: true
      # chunk_size=2, aggregation=max chosen from Week 7 chunking sweep
      # (see reports/chunking_ablation.md). cs2+max → recall=0.933, F1=0.966;
      # cs3+max only reaches recall=0.867 but halves latency.
      chunk_size: 2
      chunk_overlap: 0
      chunk_aggregation: max
      # Routing optimization: if > 0.0, skip LLM call for chunks whose
      # PoisonDetector embedding score is below this threshold. Reduces
      # judge-call count on obviously-clean chunks. 0.0 = always call.
      embedding_gate_threshold: 0.0
    context_filter:
      removal_threshold: 0.45
      low_confidence_threshold: 0.30
      min_safe_docs: 2
